name: Build Resume PDFs

on:
  push:
    branches: [main]
    paths:
      - "resume.tex"
      - "resume.cls"
      - "Makefile"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live and CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-lang-chinese \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-plain-generic \
            fonts-noto-cjk \
            fonts-font-awesome
          sudo fc-cache -fv

      - name: Build English PDF
        run: make en

      - name: Build Chinese PDF
        run: make zh

      - name: Upload PDFs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdfs
          path: |
            resume-en.pdf
            resume-zh.pdf

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: latex-logs
          path: |
            resume-en.log
            resume-zh.log
